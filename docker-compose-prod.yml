services:
  backend:
    build:
      context: ./hub-ride-backend
    image: lcaohoanq/hub-ride-backend:latest
    mem_limit: 4096m
    cpus: 2.5
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${DATABASE_USER:-neondb_owner}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      ROOM_COUNTDOWN_SECONDS: ${ROOM_COUNTDOWN_SECONDS:-30}
    ports:
      - "8081:8081"
    restart: unless-stopped

  frontend:
    build:
      context: ./hub-ride-frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8081/ws}
        NEXT_PUBLIC_GOONG_API_KEY: ${NEXT_PUBLIC_GOONG_API_KEY:-}
        NEXT_PUBLIC_ROOM_COUNTDOWN_SECONDS: ${NEXT_PUBLIC_ROOM_COUNTDOWN_SECONDS:-30}
    image: lcaohoanq/hub-ride-frontend:latest
    mem_limit: 2048m
    cpus: 1.0
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
